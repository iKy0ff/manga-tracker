name: Sync Kitsu Manga Stats

on:
  schedule:
    # Offset from :00/:15/:30/:45 to avoid global queue pile-ups
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: kitsu-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TZ: 'Europe/Paris'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        run: node scripts/sync.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "manga-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          
          # Stage files individually so missing ones don't trigger a fatal error
          git add manga_history_data.js 2>/dev/null || true
          git add manga_history_data.bak 2>/dev/null || true
          git add manga_history_data_*.bak.js 2>/dev/null || true
          git add sync_errors.log 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "sync: update manga chapter data [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
