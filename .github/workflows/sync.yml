name: Sync Kitsu Manga Stats

on:
  schedule:
    # Offset from :00/:15/:30/:45 to avoid global queue pile-ups
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: kitsu-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TZ: 'Europe/Paris'

    # ── Sync mode gate ─────────────────────────────────────────────────
    # Controlled by the repo variable SYNC_MODE (Settings → Secrets and
    # variables → Actions → Variables). No YAML editing needed to switch —
    # just change the variable's value. Allowed values:
    #
    #   manual  → job never runs on GitHub at all (run scripts/sync.mjs
    #             on your own machine instead)
    #   github  → only GitHub's own schedule trigger runs the sync
    #             (workflow_dispatch still works for manual test runs)
    #   cron    → GitHub's schedule trigger is ignored; only an external
    #             call to the workflow_dispatch API (e.g. cron-job.org)
    #             runs the sync
    #   both    → both triggers run the sync (default if unset)
    #
    # Note: the `schedule:` trigger above still fires on GitHub's cron
    # regardless of mode — this gate just makes the job skip instantly
    # (no checkout, no Node setup) instead of running the sync, so
    # unwanted runs cost effectively nothing.
    if: >-
      (github.event_name == 'schedule' && (vars.SYNC_MODE == '' || vars.SYNC_MODE == 'github' || vars.SYNC_MODE == 'both')) ||
      (github.event_name == 'workflow_dispatch' && vars.SYNC_MODE != 'manual')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        run: node scripts/sync.mjs
        continue-on-error: true
        id: sync_step

      - name: Commit and push if changed
        if: always()
        run: |
          git config user.name "manga-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          
          # Stage files individually so missing ones don't trigger a fatal error
          git add manga_history_data.js 2>/dev/null || true
          git add manga_history_data.bak 2>/dev/null || true
          git add -A daily_backup/ 2>/dev/null || true
          git add sync_errors.log 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "sync: update manga chapter data [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi

      - name: Fail the run if the sync script failed
        if: steps.sync_step.outcome == 'failure'
        run: exit 1

